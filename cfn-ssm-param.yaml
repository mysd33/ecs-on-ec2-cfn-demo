AWSTemplateFormatVersion: 2010-09-09
Description: SSM Parameter Store Template for CloudFormation Demo. Depends on cfn-ecahce-valkey.yaml, cfn-rds-aurora.yaml, cfn-sqs.yaml, cfn-dynamodb.yaml, cfn-alb.yaml

Parameters: 
  StackPrefix:
    Description: Stack Resource Name Prefix
    Type: String
    Default: Demo
  ProjectName:
    Description: Project Name
    Type: String
    Default: example
  EnvName:
    Description: Environment Name
    Type: String
    AllowedValues: ["Dev", "Staging", "Production"]    
    Default: Production
  AppDataS3BucketName:
    Description: Location of S3 Bucket For Application Data
    Type: String
    Default: mysd33bucket123  
  # PostgreSQL Timeout Settings for Aurora Auto Pause
  # https://docs.aws.amazon.com/ja_jp/AmazonRDS/latest/AuroraUserGuide/aurora-serverless-v2-auto-pause.html#auto-pause-how-it-works
  # PostgreSQL Parameters
  # https://jdbc.postgresql.org/documentation/use/#connection-parameters
  PostgresConnectTimeout:
    Description: The timeout value used for socket connect operations. JDBC Driver default value is 10. max value is 2147484. 0 means timeout disabled.
    Type: String
    Default: "35"
#    Default: "30"
  # HikariCP connectionTimeout for Aurora Auto Pause  
  # https://github.com/brettwooldridge/HikariCP?tab=readme-ov-file#frequently-used
  HikariCPConnectionTimeout:
    Description: the maximum number of milliseconds that a client (that's you) will wait for a connection from the pool Default is 30000 (30 seconds). 
    Type: String
    Default: "40000"
#    Default: "30000"
  # HikariCP initializationFailTimeout for Aurora Auto Pause  
  # https://github.com/brettwooldridge/HikariCP?tab=readme-ov-file#infrequently-used  
  HikariCPInitializationFailTimeout: 
    Description: whether the pool will "fail fast" if the pool cannot be seeded with an initial connection successfully
    Type: String
    # If the value is zero (0), HikariCP will attempt to obtain and validate a connection. If a connection is obtained, but fails validation, an exception will be thrown and the pool not started. However, if a connection cannot be obtained, the pool will start, but later efforts to obtain a connection may fail. 
    Default: 0
    # Any positive number is taken to be the number of milliseconds to attempt to acquire an initial connection; the application thread will be blocked during this period. 
    #Default: "30000"
    


Resources:
  #common
  CommonSQSParameters:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.sqs.region
      Type: String
      Value: !Ref AWS::Region
  CommonS3RegionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.s3.region
      Type: String
      Value: !Ref AWS::Region
  CommonS3BucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.s3.bucket
      Type: String
      Value: !Ref AppDataS3BucketName
  CommonDynamoDBRegionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.dynamodb.region
      Type: String
      Value: !Ref AWS::Region
  CommonDynamoDBTodoTableNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.dynamodb.todo-tablename
      Type: String
      Value:
        Fn::ImportValue: !Sub ${StackPrefix}-TodoTableName
  CommonRedisHostParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/spring.data.redis.host
      Type: String
      Value:
        Fn::ImportValue: !Sub ${StackPrefix}-ECachePrimaryEndPoint
  CommonRedisSSLEnabledParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/spring.data.redis.ssl.enabled
      Type: String
      Value: true
  CommonDatasourceUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/spring.datasource.url
      Type: String
      Value:
        Fn::Join: 
          - ""
          - - "jdbc:postgresql://"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSClusterEndpointAddress
            - ":"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSClusterEndpointPort
            - "/"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSDBName
            - !Sub "?connectTimeout=${PostgresConnectTimeout}"
  CommonWriteDatasourceUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.datasource.write.url
      Type: String
      Value:
        Fn::Join: 
          - ""
          - - "jdbc:postgresql://"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSClusterEndpointAddress
            - ":"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSClusterEndpointPort
            - "/"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSDBName
            - !Sub "?connectTimeout=${PostgresConnectTimeout}"
  CommonReadDatasourceUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.datasource.read.url
      Type: String
      Value:
        Fn::Join: 
          - ""
          - - "jdbc:postgresql://"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSReaderEndpointAddress
            - ":"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSClusterEndpointPort
            - "/"
            - Fn::ImportValue: !Sub ${StackPrefix}-RDSDBName
            - !Sub "?connectTimeout=${PostgresConnectTimeout}"
  CommonHikariCPConnectionTimeoutParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/spring.datasource.hikari.connection-timeout
      Type: String
      Value: !Ref HikariCPConnectionTimeout
  CommonHikariCPInitializationFailTimeoutParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/spring.datasource.hikari.initialization-fail-timeout
      Type: String
      Value: !Ref HikariCPInitializationFailTimeout
  CommonReadDataSourceHikariCPConnectionTimeoutParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.datasource.read.hikari.connection-timeout
      Type: String
      Value: !Ref HikariCPConnectionTimeout
  CommonReadDataSourceHikariCPInitializationFailTimeoutParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.datasource.read.hikari.initialization-fail-timeout
      Type: String
      Value: !Ref HikariCPInitializationFailTimeout
  CommonWriteDataSourceHikariCPConnectionTimeoutParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.datasource.write.hikari.connection-timeout
      Type: String
      Value: !Ref HikariCPConnectionTimeout
  CommonWriteDataSourceHikariCPInitializationFailTimeoutParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.datasource.write.hikari.initialization-fail-timeout
      Type: String
      Value: !Ref HikariCPInitializationFailTimeout          
  CommonApiBackendUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/common/example.api.backend.url
      Type: String
      Value: 
        Fn::Join: 
          - ""
          - - "http://"
            - Fn::ImportValue: !Sub ${StackPrefix}-PrivALB-DNS            
  # sample-bff
  SampleBffTimeoutDurationParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-bff/resilience4j.timelimiter.configs.default.timeoutDuration
      Type: String
      Value: 3s            
  SampleBffAsyncQueueParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-bff/example.async.queue
      Type: String
      Value:
        Fn::ImportValue: !Sub ${StackPrefix}-SQSQueueName      
  SampleBffDatasourceDynamicRoutingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-bff/example.datasource.dynamic-routing.enabled
      Type: String
      Value: true
  # sample-backend
  SampleBackendDatasourceDynamicRoutingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-backend/example.datasource.dynamic-routing.enabled
      Type: String
      Value: true

  # sample-batch
  SampleBatchSqsListenerQueueNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-batch/example.sqs.listener.queue-name
      Type: String
      Value:
        Fn::ImportValue: !Sub ${StackPrefix}-SQSQueueName
  SampleBatchTimeoutDurationParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-batch/resilience4j.timelimiter.configs.default.timeoutDuration
      Type: String
      Value: 3s
  #sample-schedulelaunch
  SampleScheduleLaunchBatchQueuesSampleBatchNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /config/${ProjectName}/${EnvName}/sample-schedulelaunch/example.batch.queues.samplebatch.name
      Type: String
      Value:
        Fn::ImportValue: !Sub ${StackPrefix}-SQSQueueName
